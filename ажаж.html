<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHI4567 Stream</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#7c3aed 0%,transparent 40%),
    radial-gradient(circle at bottom right,#ec4899 0%,transparent 40%),
    #09090f;
    overflow:hidden;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter:blur(40px);
}

.card{
    position:relative;
    width:90%;
    max-width:520px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.avatar{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#9146ff,#ff0050);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:800;
    color:white;
    box-shadow:0 0 30px rgba(145,70,255,.5);
}

h1{
    margin-top:20px;
    color:white;
    font-size:2rem;
}

.subtitle{
    margin-top:10px;
    color:#cfcfcf;
    line-height:1.6;
}

.buttons{
    margin-top:35px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn{
    text-decoration:none;
    padding:18px;
    border-radius:18px;
    color:white;
    font-weight:700;
    font-size:1.05rem;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px) scale(1.02);
}

.twitch{
    background:linear-gradient(135deg,#9146ff,#6d28d9);
    box-shadow:0 10px 25px rgba(145,70,255,.35);
}

.tiktok{
    background:linear-gradient(135deg,#ff0050,#00f2ea);
    box-shadow:0 10px 25px rgba(255,0,80,.35);
}

.footer{
    margin-top:30px;
    color:#999;
    font-size:.9rem;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <div class="avatar">M</div>

    <h1>MHI4567</h1>

    <p class="subtitle">
        Добро пожаловать на мои площадки.<br>
        Смотри стримы и свежий контент.
    </p>

    <div class="buttons">

        <a class="btn twitch"
           href="https://m.twitch.tv/mhi4567/home"
           target="_blank">
           🎮 Twitch
        </a>

        <a class="btn tiktok"
           href="https://www.tiktok.com/@mhi4567_stream"
           target="_blank">
           🎵 TikTok
        </a>

    </div>

    <div class="footer">
        © 2026 MHI4567 Stream
    </div>

</div>

</body>
</html>
